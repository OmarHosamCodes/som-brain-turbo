name: som-brain-turbo

services:
  postgres:
    image: postgres
    container_name: som-brain-turbo-postgres
    environment:
      POSTGRES_DB: som-brain-turbo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - som-brain-turbo_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  som-brain-turbo_postgres_data:
